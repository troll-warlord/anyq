name: Release anyq

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch   # bug fixes            v0.1.0 → v0.1.1
          - minor   # new features         v0.1.0 → v0.2.0
          - major   # breaking changes     v0.1.0 → v1.0.0

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history + all tags needed for svu

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install svu
        run: GOTOOLCHAIN=auto go install github.com/caarlos0/svu/v3@latest

      - name: Calculate and push tag
        id: tag
        run: |
          NEW_TAG=$(svu ${{ github.event.inputs.bump }})
          echo "Tagging $NEW_TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch Docker builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Update floating major version tag
        run: |
          MAJOR=$(echo "${{ steps.tag.outputs.new_tag }}" | cut -d. -f1)
          git tag -fa "$MAJOR" -m "Update $MAJOR floating tag to ${{ steps.tag.outputs.new_tag }}"
          git push origin "$MAJOR" --force

      - name: Write job summary
        run: |
          MAJOR=$(echo "${{ steps.tag.outputs.new_tag }}" | cut -d. -f1)
          echo "## 🚀 Released ${{ steps.tag.outputs.new_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.tag.outputs.new_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Floating tag** | \`$MAJOR\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release** | https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.new_tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Docker** | \`ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.new_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
