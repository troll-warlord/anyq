# golangci-lint v2 configuration
# Docs: https://golangci-lint.run/usage/configuration/
# Migration guide: https://golangci-lint.run/docs/product/migration-guide/
version: "2"

linters:
  # Default-enabled linters (no need to list explicitly):
  #   errcheck, govet, ineffassign, staticcheck, unused
  # Only linters not in the default set are listed here.
  enable:
    - bodyclose  # HTTP response body not closed
    - gosec      # security checks
    - misspell   # spelling mistakes in comments/strings
    - noctx      # HTTP requests without context.Context

  settings:
    gosec:
      excludes:
        - G304  # Potential file inclusion via variable — intentional; anyq is a CLI that reads user-specified files

  exclusions:
    generated: lax  # apply relaxed rules to generated files
    presets:
      - comments              # suppress missing-comment warnings
      - common-false-positives # suppress well-known false positives
      - legacy                # suppress issues from pre-modules Go patterns
      - std-error-handling    # suppress errors from standard library error handling idioms
    rules:
      # Test files don't need strict error checking or security scanning
      - linters:
          - errcheck
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt     # standard Go formatting
    - goimports # import grouping and ordering
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
